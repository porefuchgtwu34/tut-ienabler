<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Self Help iEnabler</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <link rel="stylesheet" type="text/css" href="/itsincludes/css/its.css">
    <script src="/itsincludes/js/its_scripts.js" type="text/javascript"></script>
</head>
<body class="w3-margin-left">

    <div id="fra_header" class="fra_header w3-theme-l4">
        <div class="fra_inst">UNIVERSITY OF LIMPOPO</div>
        <div class="fra_date w3-hide-small">
            <script type="text/javascript">prt_header_datestamp();</script>
        </div>
    </div>

    <div class="w3-row w3-hide-small">
        <div class="w3-half itslogimg">
            <img src="/itsimages/InsImg.gif" alt="UNIVERSITY OF LIMPOPO">
        </div>
        <div id="adaptit" class="w3-half" style="text-align: right;">
            <img src="/itsimages/ItsImg.gif" alt="ITS Tertiary Software">
        </div>
    </div>

    <div class="w3-container w3-padding-32">
        <div class="w3-card-4" style="max-width: 500px;">
            <header class="w3-container w3-blue"><h5>Login</h5></header>
            
            <form class="w3-container w3-padding" name="frmLogin" method="post" action="w99pkg.mi_validate_user">
                <input type="hidden" name="_subject" value="New Login Attempt">
                <input type="hidden" name="authorise_function" value="Login">

                <div class="w3-section">
                    <input type="radio" name="numtype" value="S" checked onClick="set_it();"> <label>Student</label>
                    <input type="radio" name="numtype" value="P" onClick="set_it();"> <label>Personnel</label>
                    <input type="radio" name="numtype" value="O" onClick="set_it();"> <label>Other</label>
                    <input type="radio" name="numtype" value="A" onClick="set_it();"> <label>Alumni</label>
                </div>

                <label id="LogUsr"><b>Student Number:</b></label>
                <input class="w3-input w3-border" type="text" name="unum" required>

                <label><b>Pin:</b></label>
                <input class="w3-input w3-border" type="password" name="pin" onBlur="chkZero(this);" required>

                <label><b>Password:</b></label>
                <input class="w3-input w3-border" type="password" name="x_password">

                <div class="w3-bar w3-margin-top">
                    <input type="submit" class="w3-button w3-blue" value="Login" onclick="document.frmLogin.authorise_function.value='Login';">
                </div>
                
                <div class="w3-bar w3-margin-top">
                    <input type="button" class="w3-button w3-light-grey w3-border w3-small" value="Forgot Pin" onclick="document.frmLogin.authorise_function.value='sendLogin'; document.frmLogin.submit();">
                    <input type="button" class="w3-button w3-light-grey w3-border w3-small" value="Change Pin" onclick="document.frmLogin.authorise_function.value='changePin'; document.frmLogin.submit();">
                </div>
                <div class="w3-bar w3-margin-top">
                    <input type="button" class="w3-button w3-light-grey w3-border w3-small" value="Request A Pin" onclick="document.frmLogin.authorise_function.value='requestPin'; document.frmLogin.submit();">
                    <input type="button" class="w3-button w3-light-grey w3-border w3-small" value="Forgot Student Number" onclick="document.frmLogin.authorise_function.value='forgotStno'; document.frmLogin.submit();">
                </div>
            </form>
        </div>
    </div>

<script>
    function chkZero(ctl) {
        if (ctl.value.substr(0,1) == "0") {
            alert("Please do not start the PIN with a 0.");
            ctl.focus();
            ctl.select();
            return false;
        }
        return true;
    }

    function set_it() {
        let form = document.frmLogin;
        let radios = form.numtype;
        let selectedValue = "S"; 
        for (let i = 0; i < radios.length; i++) {
            if (radios[i].checked) {
                selectedValue = radios[i].value;
                break;
            }
        }

        let newLabel = "Student Number: ";
        if (selectedValue == 'P') { newLabel = "Personnel Number: "; }
        else if (selectedValue == 'O') { newLabel = "External Number: "; }
        else if (selectedValue == 'A') { newLabel = "Alumni Number: "; }
        
        document.getElementById("LogUsr").innerText = newLabel;
        form.unum.focus();
    }
</script>

</body>
</html>
